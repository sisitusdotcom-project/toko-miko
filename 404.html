<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Base CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/404.css">
</head>
<body>
    <div class="error-page">
        <div class="error-card">
            <div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <div class="error-code">404</div>
            <h1 class="error-title">Akses Ditolak / Tidak Ditemukan</h1>
            <p class="error-desc">Maaf, halaman yang Anda tuju tidak ada atau Anda tidak memiliki hak akses administrator untuk melihat halaman ini.</p>
            <div class="action-buttons">
                <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house mr-2"></i> Kembali ke Beranda</a>
                <a href="login.html" class="btn btn-outline" style="border-color: var(--primary-color); color: var(--primary-color);"><i class="fa-solid fa-right-to-bracket"></i> Masuk Akun</a>
            </div>
        </div>
    </div>
</body>
</html>
